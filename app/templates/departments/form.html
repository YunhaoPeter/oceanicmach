{% extends "base.html" %}
{% block title %}{% if department %}编辑部门{% else %}新增部门{% endif %} - Oceanicmach{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto;">
  <h2 style="font-size:20px;margin-bottom:20px;">{% if department %}编辑部门{% else %}新增部门{% endif %}</h2>
  <form method="post" action="/departments/save">
    {% if department %}<input type="hidden" name="id" value="{{ department.id }}">{% endif %}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>归属主体 <span style="color:red;">*</span></label>
        <select name="company_entity_id" required>
          <option value="">请选择</option>
          {% for e in entities %}
          <option value="{{ e.id }}" {% if department and department.company_entity_id==e.id %}selected{% endif %}>{{ e.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>上级部门</label>
        <select name="parent_id">
          <option value="0">无（顶级部门）</option>
          {% for d in departments %}
          {% if not department or d.id != department.id %}
          <option value="{{ d.id }}" {% if department and department.parent_id==d.id %}selected{% endif %}>
            {% for _ in range(d._level) %}　{% endfor %}{{ d.name }}
          </option>
          {% endif %}
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>部门编码 <span style="color:red;">*</span></label>
        <input type="text" name="department_code" value="{{ department.department_code if department else '' }}" required>
      </div>
      <div class="form-group">
        <label>部门名称 <span style="color:red;">*</span></label>
        <input type="text" name="name" value="{{ department.name if department else '' }}" required>
      </div>
      <div class="form-group">
        <label>排序号</label>
        <input type="number" name="sort_order" value="{{ department.sort_order if department else 0 }}">
      </div>
      <div class="form-group">
        <label>状态</label>
        <select name="status">
          <option value="启用" {% if not department or department.status=="启用" %}selected{% endif %}>启用</option>
          <option value="禁用" {% if department and department.status=="禁用" %}selected{% endif %}>禁用</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea name="remark" rows="3">{{ department.remark if department else '' }}</textarea>
    </div>
    <div style="display:flex;gap:12px;margin-top:20px;">
      <button type="submit" class="btn btn-primary">保存</button>
      <a href="/departments" class="btn" style="background:#e2e8f0;color:#4a5568;">取消</a>
    </div>
  </form>
</div>
{% endblock %}
