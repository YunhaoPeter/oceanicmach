{% extends "base.html" %}
{% block title %}{% if product %}编辑产品{% else %}新增产品{% endif %} - Oceanicmach{% endblock %}
{% block content %}
<div style="max-width:640px;margin:0 auto;">
  <h2 style="font-size:20px;margin-bottom:20px;">{% if product %}编辑产品{% else %}新增产品{% endif %}</h2>
  <form method="post" action="/products/save">
    {% if product %}<input type="hidden" name="id" value="{{ product.id }}">{% endif %}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="form-group">
        <label>产品编码 <span style="color:red;">*</span></label>
        <input type="text" name="product_code" value="{{ product.product_code if product else '' }}" required>
      </div>
      <div class="form-group">
        <label>产品名称 <span style="color:red;">*</span></label>
        <input type="text" name="name" value="{{ product.name if product else '' }}" required>
      </div>
      <div class="form-group">
        <label>产品型号</label>
        <input type="text" name="model" value="{{ product.model if product else '' }}">
      </div>
      <div class="form-group">
        <label>产品分类 <span style="color:red;">*</span></label>
        <select name="category" required>
          <option value="">请选择</option>
          {% for c in ["成品","半成品","原材料","服务"] %}
          <option value="{{ c }}" {% if product and product.category==c %}selected{% endif %}>{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>规格</label>
        <input type="text" name="specification" value="{{ product.specification if product else '' }}">
      </div>
      <div class="form-group">
        <label>计量单位 <span style="color:red;">*</span></label>
        <select name="unit" required>
          <option value="">请选择</option>
          {% for u in ["个","台","套","件","m","t","L"] %}
          <option value="{{ u }}" {% if product and product.unit==u %}selected{% endif %}>{{ u }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>销售价格</label>
        <input type="number" step="0.01" name="sales_price" value="{{ product.sales_price if product else '' }}">
      </div>
      <div class="form-group">
        <label>成本价格</label>
        <input type="number" step="0.01" name="cost_price" value="{{ product.cost_price if product else '' }}">
      </div>
      <div class="form-group">
        <label>税率 (%)</label>
        <input type="number" step="0.01" name="tax_rate" value="{{ product.tax_rate if product else 13.0 }}">
      </div>
      <div class="form-group">
        <label>状态 <span style="color:red;">*</span></label>
        <select name="status" required>
          {% for s in ["在售","停产","研发中"] %}
          <option value="{{ s }}" {% if (product and product.status==s) or (not product and s=="在售") %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>备注</label>
      <textarea name="remark" rows="3">{{ product.remark if product else '' }}</textarea>
    </div>
    <div style="display:flex;gap:12px;margin-top:20px;">
      <button type="submit" class="btn btn-primary">保存</button>
      <a href="/products" class="btn" style="background:#e2e8f0;color:#4a5568;">取消</a>
    </div>
  </form>
</div>
{% endblock %}
